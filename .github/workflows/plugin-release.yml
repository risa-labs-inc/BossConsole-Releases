name: Plugin Release

on:
  workflow_call:
    inputs:
      boss_plugin_api_version:
        description: 'Version of boss-plugin-api: "latest" (default) auto-fetches newest release, specific version like "1.0.36", or "none" to skip.'
        required: false
        type: string
        default: 'latest'
      version_increment:
        description: 'Version increment type: patch, minor, major, or none to skip bumping.'
        required: false
        type: string
        default: 'patch'
    secrets:
      BOSS_STORE_PLUGIN_PUBLISH_KEY:
        required: true
      SUPABASE_ANON_KEY:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        if: inputs.version_increment != 'none'
        run: |
          CURRENT=$(grep '^version = ' build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.version_increment }}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          sed -i "s/^version = \".*\"/version = \"${NEW_VERSION}\"/" build.gradle.kts

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "🔖 Bump version to ${NEW_VERSION} [skip ci]"
          git push

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download boss-plugin-api
        if: inputs.boss_plugin_api_version != 'none' && inputs.boss_plugin_api_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build/downloaded-deps
          API_VERSION="${{ inputs.boss_plugin_api_version }}"
          if [ "$API_VERSION" = "latest" ]; then
            # Auto-resolve latest release version
            API_VERSION=$(gh api repos/risa-labs-inc/boss-plugin-api/releases/latest --jq '.tag_name' | sed 's/^v//')
            echo "Resolved latest boss-plugin-api version: $API_VERSION"
          fi
          curl -sL -o build/downloaded-deps/boss-plugin-api.jar \
            "https://github.com/risa-labs-inc/boss-plugin-api/releases/download/v${API_VERSION}/boss-plugin-api-${API_VERSION}.jar"
          echo "Downloaded boss-plugin-api v${API_VERSION}"
          ls -la build/downloaded-deps/

      - name: Build plugin
        run: ./gradlew build
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete existing release
        run: gh release delete "v${{ steps.version.outputs.version }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to BOSS Plugin Store
        run: |
          echo "Publishing to BOSS Plugin Store..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.risaboss.com/functions/v1/plugin-store/github" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.BOSS_STORE_PLUGIN_PUBLISH_KEY }}" \
            -d "{\"githubUrl\": \"${{ github.server_url }}/${{ github.repository }}\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Failed to publish to BOSS Store (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Successfully published to BOSS Plugin Store"
